<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YouTube Shorts Switch</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>YouTube Shorts</h1>
      <label class="toggle-row" for="shorts-toggle">
        <input id="shorts-toggle" type="checkbox" />
        <span>Disable all Shorts</span>
      </label>
      <p id="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
