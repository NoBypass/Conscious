<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Conscious</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>YouTube Controls</h1>
      <label class="toggle-row" for="shorts-toggle">
        <input id="shorts-toggle" type="checkbox" />
        <span>Disable all Shorts</span>
      </label>
      <p id="status" aria-live="polite"></p>

      <section class="history-section">
        <h2>Watch history</h2>
        <p id="history-empty" class="muted">No watch history yet.</p>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
